<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KPI Monitor — Reparto</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="../assets/css/reparto.css">

<!-- ── AUTH GUARD ── -->
<script src="../config/users.js"></script>
<script src="../config/reparti.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  (function(){
    window.__REPARTO_SLUG = '__SLUG__';
    const s = AUTH.protect({ require: window.__REPARTO_SLUG, loginPath: '../login.html' });
    if (!s) throw new Error('Redirect to login');
  })();
</script>
<script src="../assets/js/reparto-engine.js"></script>
</head>
<body>

<nav id="sb">
  <div class="sb-logo">
    <div class="sb-mark">K</div>
    <div><div class="sb-brand">KPI Monitor</div><div class="sb-ver">Hub Reparti 2026</div></div>
  </div>
  <div class="sb-nav">
    <div class="sb-sec">Navigazione</div>
    <a class="ni" href="../hub.html" id="sb-hub-link" style="display:none">
      <span class="ni-emoji">📊</span> Dashboard Master
    </a>
    <div class="sb-sec">Reparti</div>
    <div id="sb-reparti"></div>
  </div>
  <div class="sb-foot">
    <div class="sb-foot-row"><span>Mese di rif.</span><span class="sb-foot-val" id="sb-mese">—</span></div>
    <div class="sb-foot-row"><span>Aggiornato il</span><span class="sb-foot-val" id="sb-data">—</span></div>
  </div>
</nav>

<div id="main">
  <div id="topbar">
    <strong id="bcrumb">Reparto</strong>
    <div style="flex:1"></div>
    <div class="chip-date" id="today-chip"></div>
    <div class="mese-box">
      <label>Mese:</label>
      <select id="global-mese">
        <option value="0">Gennaio</option><option value="1">Febbraio</option>
        <option value="2">Marzo</option><option value="3">Aprile</option>
        <option value="4">Maggio</option><option value="5">Giugno</option>
        <option value="6">Luglio</option><option value="7">Agosto</option>
        <option value="8">Settembre</option><option value="9">Ottobre</option>
        <option value="10">Novembre</option><option value="11">Dicembre</option>
      </select>
    </div>
  </div>

  <div id="content">

    <div class="ph">
      <div>
        <div class="ph-title">
          <span class="ph-icon-box" id="ph-icon">📁</span>
          <span id="ph-name">Reparto</span>
        </div>
        <div class="ph-sub" id="rep-subtitle">Dashboard KPI</div>
      </div>
    </div>

    <div class="kpi-grid" id="kpi-summary"></div>

    <div class="panel">
      <div class="panel-hd">
        <span class="panel-title">📊 Riepilogo Mensile — <span id="ins-mese-lbl">—</span></span>
      </div>
      <div class="panel-body" style="padding:0;overflow-x:auto;">
        <div class="riepilogo-cols-inner" id="riepilogo-cols"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-hd">
        <span class="panel-title">⚠️ Alert &amp; Segnalazioni</span>
        <span style="font-size:11px;color:var(--text3);font-weight:700">
          <span id="alert-counter">0</span> attivi
        </span>
      </div>
      <div class="panel-body">
        <div class="alert-list" id="alert-list"></div>
      </div>
    </div>

    <div class="chart-grid-2">
      <div class="panel" style="margin-bottom:0">
        <div class="panel-hd">
          <span class="panel-title">📈 Andamento Annuale</span>
          <div class="kpi-selector">
            <label style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px">KPI:</label>
            <select id="sel-trend-kpi"></select>
          </div>
        </div>
        <div class="panel-body">
          <div class="chart-canvas-wrap"><canvas id="ch-trend"></canvas></div>
        </div>
      </div>

      <div class="panel" style="margin-bottom:0">
        <div class="panel-hd">
          <span class="panel-title">🎯 Performance vs Target — Mese corrente</span>
        </div>
        <div class="panel-body">
          <div class="chart-canvas-wrap"><canvas id="ch-performance"></canvas></div>
        </div>
      </div>
    </div>

    <div class="panel" style="margin-top:18px">
      <div class="panel-hd">
        <span class="panel-title">📅 Dettaglio Mensile — Tutti i KPI</span>
      </div>
      <div class="panel-body" style="padding:0;overflow-x:auto;">
        <div id="tabella-dettaglio"></div>
      </div>
    </div>

  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  AUTH.injectUserBar();
  const sbMese = document.getElementById('sb-mese');
  if (sbMese) {
    const MS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
    sbMese.textContent = MS[new Date().getMonth()];
  }

  const slug = window.__REPARTO_SLUG;
  const repartoCfg = (window.REPARTI || []).find(r => r.slug === slug);
  if (!repartoCfg) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><div class="ico">⚠️</div><p>Reparto <code>'+slug+'</code> non configurato in <code>config/reparti.js</code></p></div>';
    return;
  }

  RepartoEngine.init({
    slug: slug,
    repartoCfg: repartoCfg,
    dataFile: repartoCfg.dataFile
  });

  setTimeout(() => {
    const dt = RepartoEngine.data && RepartoEngine.data.ultimoAggiornamento;
    if (dt) document.getElementById('sb-data').textContent = dt;
  }, 500);
});
</script>

</body>
</html>

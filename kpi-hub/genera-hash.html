<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Genera Hash Password</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:#f5f6fa;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px;color:#111827;}
.card{background:#fff;border-radius:16px;padding:32px;width:100%;max-width:520px;
  box-shadow:0 10px 40px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04);
  border:1px solid rgba(17,24,39,.06);}
h1{font-size:22px;font-weight:800;margin-bottom:6px;letter-spacing:-.3px;}
.sub{color:#6b7280;font-size:13px;margin-bottom:22px;font-weight:500;}
.field{margin-bottom:14px;}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;color:#374151;margin-bottom:6px;}
input{width:100%;font-family:inherit;font-size:14px;font-weight:600;
  padding:11px 14px;border:1.5px solid rgba(17,24,39,.14);border-radius:10px;
  background:#fafbfc;outline:none;transition:border-color .15s,box-shadow .15s;}
input:focus{border-color:#6366f1;box-shadow:0 0 0 4px rgba(99,102,241,.12);background:#fff;}
button{width:100%;font-family:inherit;font-size:14px;font-weight:700;padding:13px;
  border:none;border-radius:10px;cursor:pointer;
  background:linear-gradient(135deg,#6366f1,#4338ca);color:#fff;
  box-shadow:0 6px 18px rgba(99,102,241,.32);transition:transform .12s;}
button:hover{transform:translateY(-1px);}
.result{margin-top:20px;padding:16px;background:#0d0f14;border-radius:10px;
  font-family:'DM Mono',monospace;font-size:12.5px;color:#a5b4fc;
  word-break:break-all;line-height:1.5;display:none;}
.result.show{display:block;}
.result-lbl{color:#6b7280;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:6px;font-family:'Montserrat',sans-serif;}
.copy-hint{font-size:11px;color:#9ca3af;margin-top:10px;font-style:italic;}
.snippet{margin-top:14px;padding:14px;background:#fff;border:1px dashed #6366f1;border-radius:8px;
  font-family:'DM Mono',monospace;font-size:11px;color:#374151;line-height:1.5;display:none;
  white-space:pre-wrap;word-break:break-all;}
.snippet.show{display:block;}
.copy-btn{background:none;border:1px solid #6366f1;color:#6366f1;
  padding:5px 10px;font-size:11px;border-radius:6px;cursor:pointer;
  width:auto;font-weight:700;box-shadow:none;margin-top:8px;}
.copy-btn:hover{background:#6366f1;color:#fff;transform:none;}
.warn{background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.2);color:#92400e;
  padding:10px 12px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:18px;}
</style>
</head>
<body>

<div class="card">
  <h1>🔐 Genera Hash Password</h1>
  <p class="sub">Usa questo tool per generare l'hash SHA-256 di una password da inserire in <code style="background:#f3f4f6;padding:2px 5px;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px">config/users.js</code></p>

  <div class="warn">⚠️ Apri questa pagina anche solo in locale (doppio click sul file). Non condividere le password in chiaro: copia solo l'hash.</div>

  <div class="field">
    <label>Password</label>
    <input type="text" id="pw" placeholder="Scrivi la password qui..." autofocus>
  </div>

  <button onclick="gen()">Genera hash</button>

  <div class="result" id="result">
    <div class="result-lbl">SHA-256 Hash:</div>
    <div id="hash"></div>
  </div>

  <div class="snippet" id="snippet"></div>
  <button class="copy-btn" id="copy-btn" style="display:none" onclick="copyHash()">📋 Copia hash</button>
</div>

<script>
async function sha256(str){
  const buf = new TextEncoder().encode(str);
  const h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function gen(){
  const pw = document.getElementById('pw').value;
  if (!pw) { alert('Inserisci una password'); return; }
  const h = await sha256(pw);
  document.getElementById('hash').textContent = h;
  document.getElementById('result').classList.add('show');
  document.getElementById('copy-btn').style.display = 'inline-block';

  const snip = document.getElementById('snippet');
  snip.textContent =
    'passwordHash: \'' + h + '\',';
  snip.classList.add('show');
}

function copyHash(){
  const h = document.getElementById('hash').textContent;
  navigator.clipboard.writeText(h).then(()=>{
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ Copiato!';
    setTimeout(()=>btn.textContent = orig, 1500);
  });
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') gen();
});
</script>

</body>
</html>

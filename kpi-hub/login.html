<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KPI Monitor — Accesso</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --indigo:#6366f1;--indigo2:#4f46e5;--indigo3:#4338ca;
  --bg1:#0d0f14;--bg2:#111318;
  --surf:#ffffff;--text:#111827;--text2:#374151;--text3:#9ca3af;
  --border:rgba(17,24,39,0.08);--border2:rgba(17,24,39,0.14);
  --red:#ef4444;--green:#16a34a;
}
html,body{height:100%;}
body{
  font-family:'Montserrat',system-ui,sans-serif;
  background:radial-gradient(circle at 30% 20%,#1e1b4b 0%,var(--bg1) 50%,var(--bg2) 100%);
  display:flex;align-items:center;justify-content:center;padding:20px;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
/* Glow decorativo */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(600px circle at 20% 30%,rgba(99,102,241,0.18),transparent 60%),
    radial-gradient(500px circle at 80% 70%,rgba(124,58,237,0.13),transparent 60%);
}
.card{
  position:relative;z-index:1;
  background:var(--surf);
  width:100%;max-width:420px;
  border-radius:20px;padding:38px 36px 32px;
  box-shadow:0 30px 80px rgba(0,0,0,0.4),0 8px 24px rgba(0,0,0,0.2);
  border:1px solid rgba(255,255,255,0.08);
}
.logo{
  display:flex;align-items:center;gap:14px;margin-bottom:28px;
}
.logo-mark{
  width:54px;height:54px;border-radius:14px;
  background:linear-gradient(135deg,#818cf8,var(--indigo),var(--indigo3));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:900;font-size:24px;
  box-shadow:0 8px 24px rgba(99,102,241,0.45);
}
.logo-text h1{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.3px;}
.logo-text p{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

h2{font-size:22px;font-weight:800;margin-bottom:6px;letter-spacing:-.4px;}
.sub{color:var(--text3);font-size:13px;font-weight:500;margin-bottom:24px;}

.field{margin-bottom:14px;}
.field label{
  display:block;font-size:11px;font-weight:700;
  color:var(--text2);text-transform:uppercase;letter-spacing:.6px;
  margin-bottom:6px;
}
.field input{
  width:100%;font-family:inherit;font-size:14px;font-weight:600;
  padding:11px 14px;border:1.5px solid var(--border2);border-radius:10px;
  background:#fafbfc;color:var(--text);
  transition:border-color .15s,box-shadow .15s,background .15s;
  outline:none;
}
.field input:focus{
  border-color:var(--indigo);background:#fff;
  box-shadow:0 0 0 4px rgba(99,102,241,0.12);
}
.field input::placeholder{color:#c1c4cd;font-weight:500;}

.btn-login{
  width:100%;margin-top:8px;
  font-family:inherit;font-size:14px;font-weight:700;letter-spacing:.2px;
  padding:13px;border:none;border-radius:10px;cursor:pointer;
  background:linear-gradient(135deg,var(--indigo),var(--indigo3));
  color:#fff;
  box-shadow:0 6px 18px rgba(99,102,241,0.32),0 2px 4px rgba(99,102,241,0.18);
  transition:transform .12s,box-shadow .12s,opacity .12s;
}
.btn-login:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 10px 26px rgba(99,102,241,0.42);}
.btn-login:active{transform:translateY(0);}
.btn-login:disabled{opacity:.55;cursor:not-allowed;}

.alert{
  padding:10px 14px;border-radius:10px;font-size:12.5px;font-weight:600;
  margin-bottom:14px;display:none;align-items:center;gap:8px;
}
.alert.show{display:flex;}
.alert-err{background:rgba(239,68,68,0.1);color:#b91c1c;border:1px solid rgba(239,68,68,0.25);}

.foot{
  margin-top:22px;padding-top:18px;border-top:1px solid var(--border);
  text-align:center;font-size:11px;color:var(--text3);font-weight:500;
}
.foot a{color:var(--indigo);text-decoration:none;font-weight:700;}
.foot a:hover{text-decoration:underline;}

.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp 0.7s linear infinite;vertical-align:-2px;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">K</div>
    <div class="logo-text">
      <h1>KPI Monitor</h1>
      <p>Hub Reparti 2026</p>
    </div>
  </div>

  <h2>Accedi al tuo spazio</h2>
  <p class="sub">Inserisci le credenziali del tuo reparto o l'account master.</p>

  <div class="alert alert-err" id="err"></div>

  <form id="form-login" autocomplete="on">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="es. vendite, master..." autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="btn-login">Entra</button>
  </form>

  <div class="foot">
    Hai problemi di accesso? Contatta l'amministratore.
  </div>
</div>

<script src="config/users.js"></script>
<script src="config/reparti.js"></script>
<script src="assets/js/auth.js"></script>
<script>
// Se sono già loggato, mando subito alla destinazione corretta
(function(){
  const s = AUTH.current();
  if (s) redirectAfterLogin(s);
})();

function redirectAfterLogin(s){
  if (s.role === 'master') {
    window.location.href = 'hub.html';
  } else {
    // utente reparto → pagina reparto associata
    const r = (window.REPARTI || []).find(x => x.slug === s.reparto);
    if (r && r.file) window.location.href = r.file;
    else window.location.href = 'hub.html'; // fallback
  }
}

const form = document.getElementById('form-login');
const errEl = document.getElementById('err');
const btn = document.getElementById('btn-login');

function showErr(msg){
  errEl.textContent = msg;
  errEl.classList.add('show');
}
function clearErr(){
  errEl.classList.remove('show');
  errEl.textContent = '';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearErr();
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Verifica…';

  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;

  try {
    const res = await AUTH.login(u, p);
    if (!res.ok) {
      showErr(res.msg || 'Credenziali non valide');
      btn.disabled = false;
      btn.textContent = 'Entra';
      return;
    }
    redirectAfterLogin(res.session);
  } catch (e) {
    showErr('Errore di sistema: ' + (e.message || 'sconosciuto'));
    btn.disabled = false;
    btn.textContent = 'Entra';
  }
});
</script>

</body>
</html>
